<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상자 견적 단가 검색</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2435;
    --border: #2a3048;
    --accent: #4f8ef7;
    --accent2: #7c5af7;
    --green: #3ecf8e;
    --yellow: #f5c842;
    --red: #f75a68;
    --text: #e8eaf0;
    --text2: #8890a8;
    --text3: #555e7a;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ── 헤더 ── */
  .header {
    background: linear-gradient(135deg, #12162080 0%, #1a1f3080 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
  }
  .header-icon { font-size: 24px; }
  .header-title { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-top: 2px; }
  .header-badge {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
  }
  .header-badge span { color: var(--green); font-weight: 700; }

  /* ── 메인 레이아웃 ── */
  .main { display: flex; height: calc(100vh - 65px); }

  /* ── 사이드바 ── */
  .sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 업로드 존 */
  .upload-zone {
    margin: 16px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #4f8ef708; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .upload-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .upload-text strong { color: var(--accent); }
  .upload-hint { font-size: 11px; color: var(--text3); margin-top: 6px; font-family: 'IBM Plex Mono', monospace; }

  /* 진행바 */
  .progress-wrap { margin: 0 16px 12px; display: none; }
  .progress-bar { height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%; transition: width 0.3s; border-radius: 4px; }
  .progress-label { font-size: 11px; color: var(--text3); margin-top: 6px; font-family: 'IBM Plex Mono', monospace; }

  /* 검색창 */
  /* 시트 선택 */
  .sheet-select-wrap { margin: 0 16px 8px; }
  .sheet-select-label { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-bottom: 4px; }
  .sheet-list { display: flex; flex-wrap: wrap; gap: 3px; max-height: 68px; overflow-y: auto; }
  .sheet-list::-webkit-scrollbar { width: 3px; }
  .sheet-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .sheet-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    color: var(--text2);
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
    max-width: 150px;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: all 0.15s;
  }
  .sheet-btn:hover { border-color: var(--accent); color: var(--text); background: #4f8ef710; }
  .sheet-btn.active { border-color: var(--accent); color: var(--accent); background: #4f8ef718; }
  .sheet-icon { font-size: 10px; flex-shrink: 0; }
  .sheet-name { overflow: hidden; text-overflow: ellipsis; }

  .search-wrap { padding: 0 16px 12px; }
  .search-box {
    display: flex;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 12px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: var(--accent); }
  .search-icon { font-size: 14px; color: var(--text3); flex-shrink: 0; }
  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    padding: 10px 0;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-clear { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 4px; display: none; }
  .search-clear:hover { color: var(--text); }

  /* 결과 카운트 */
  .result-count { padding: 0 16px 8px; font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }

  /* 품목 목록 */
  .item-list { flex: 1; overflow-y: auto; padding: 0 8px 16px; }
  .item-list::-webkit-scrollbar { width: 4px; }
  .item-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .item-card {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    margin-bottom: 3px;
  }
  .item-card:hover { background: var(--surface2); border-color: var(--border); }
  .item-card.active { background: #4f8ef712; border-color: #4f8ef740; }

  .item-card-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-card-name mark { background: none; color: var(--accent); font-weight: 700; }
  .item-card-meta { display: flex; gap: 8px; align-items: center; }
  .badge {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
  }
  .badge-count { background: #4f8ef718; color: var(--accent); }
  .badge-avg { background: #3ecf8e18; color: var(--green); }
  .badge-single { background: var(--surface2); color: var(--text3); }

  /* 빈 상태 */
  .empty-state { padding: 40px 16px; text-align: center; color: var(--text3); }
  .empty-state .es-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state .es-text { font-size: 13px; line-height: 1.7; }

  /* ── 상세 패널 ── */
  .detail-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 초기 화면 */
  .detail-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    gap: 16px;
  }
  .detail-empty .de-icon { font-size: 56px; opacity: 0.15; }
  .detail-empty .de-title { font-size: 18px; color: var(--text2); font-weight: 500; }
  .detail-empty .de-desc { font-size: 13px; text-align: center; line-height: 1.8; }

  /* 상세 콘텐츠 */
  .detail-content { flex: 1; overflow-y: auto; padding: 28px 32px; display: none; }
  .detail-content::-webkit-scrollbar { width: 4px; }
  .detail-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* 상세 헤더 */
  .detail-header { margin-bottom: 28px; }
  .detail-name { font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin-bottom: 8px; }
  .detail-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text2);
  }

  /* 요약 카드들 */
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .summary-card.accent { border-color: #4f8ef740; background: #4f8ef708; }
  .summary-card.green { border-color: #3ecf8e40; background: #3ecf8e08; }
  .summary-card.yellow { border-color: #f5c84240; background: #f5c84208; }
  .sc-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-family: 'IBM Plex Mono', monospace; }
  .sc-value { font-size: 22px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
  .sc-value.accent { color: var(--accent); }
  .sc-value.green { color: var(--green); }
  .sc-value.yellow { color: var(--yellow); }
  .sc-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* 이력 섹션 */
  .section-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-family: 'IBM Plex Mono', monospace; }

  /* 이력 테이블 */
  .history-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
  .history-table th {
    text-align: left;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text3);
    font-weight: 500;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .history-table td {
    padding: 10px 12px;
    font-size: 13px;
    border-bottom: 1px solid #1e243540;
    vertical-align: top;
  }
  .history-table tr:hover td { background: var(--surface); }
  .td-num { color: var(--text3); font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .td-qty { font-family: 'IBM Plex Mono', monospace; color: var(--text2); }
  .td-total { font-family: 'IBM Plex Mono', monospace; color: var(--text); }
  .td-unit { font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
  .td-unit.high { color: var(--red); }
  .td-unit.mid { color: var(--yellow); }
  .td-unit.low { color: var(--green); }
  .td-process { font-size: 11px; color: var(--text3); max-width: 200px; }
  .proc-tag {
    display: inline-block;
    background: var(--surface2);
    border-radius: 3px;
    padding: 1px 5px;
    margin: 1px 2px;
    font-size: 10px;
    color: var(--text3);
  }

  /* 단가 범위 바 */
  .price-range-section { margin-bottom: 28px; }
  .price-range-bar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .range-labels { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .range-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text2); }
  .range-track { height: 8px; background: var(--surface2); border-radius: 8px; position: relative; overflow: visible; }
  .range-fill { position: absolute; top: 0; height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--green), var(--accent), var(--yellow), var(--red)); }
  .range-dots { position: relative; margin-top: 6px; height: 20px; }
  .range-dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    transform: translateX(-50%);
    cursor: pointer;
    top: 4px;
  }
  .range-dot:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
    z-index: 10;
  }
  .range-avg-line {
    position: absolute;
    width: 2px;
    height: 20px;
    background: var(--yellow);
    transform: translateX(-50%);
    top: -4px;
    border-radius: 2px;
  }

  /* 공정별 비교 */
  .process-breakdown { margin-bottom: 20px; }
  .proc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .proc-name { width: 130px; font-size: 12px; color: var(--text2); flex-shrink: 0; }
  .proc-bar-wrap { flex: 1; height: 6px; background: var(--surface2); border-radius: 6px; overflow: hidden; }
  .proc-bar { height: 100%; border-radius: 6px; background: var(--accent2); }
  .proc-price { width: 80px; text-align: right; font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--text2); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📦</div>
  <div>
    <div class="header-title">상자 견적 단가 검색</div>
    <div class="header-sub">Box Cost Analyzer</div>
  </div>
  <div class="header-badge">품목 <span id="totalCount">0</span>건 로드됨</div>
</div>

<div class="main">
  <!-- 사이드바 -->
  <div class="sidebar">
    <!-- 업로드 -->
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls" />
      <div class="upload-icon">📂</div>
      <div class="upload-text"><strong>Excel 파일 여기에 드롭</strong><br>또는 클릭해서 선택</div>
      <div class="upload-hint">*.xlsx / *.xls</div>
    </div>

    <!-- 진행바 -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">파일 읽는 중...</div>
    </div>

    <!-- 시트 선택 -->
    <div class="sheet-select-wrap" id="sheetSelectWrap" style="display:none">
      <div class="sheet-select-label">📋 시트 선택</div>
      <div class="sheet-list" id="sheetList"></div>
    </div>

    <!-- 검색 -->
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="품목명 검색..." type="text" />
        <button class="search-clear" id="searchClear">✕</button>
      </div>
    </div>

    <div class="result-count" id="resultCount"></div>

    <!-- 품목 목록 -->
    <div class="item-list" id="itemList">
      <div class="empty-state">
        <div class="es-icon">📋</div>
        <div class="es-text">Excel 파일을 업로드하면<br>품목 목록이 여기에 표시됩니다</div>
      </div>
    </div>
  </div>

  <!-- 상세 패널 -->
  <div class="detail-panel">
    <div class="detail-empty" id="detailEmpty">
      <div class="de-icon">📊</div>
      <div class="de-title">품목을 선택하세요</div>
      <div class="de-desc">왼쪽에서 품목을 클릭하면<br>과거 이력과 평균 단가를 확인할 수 있습니다</div>
    </div>
    <div class="detail-content" id="detailContent"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// 데이터 파싱
// ─────────────────────────────────────────────
let allItems = [];   // { name, instances: [{qty, total, unitPrice, processes}] }
let grouped = {};    // { name: [{...}] }
let currentGroup = null;

function parseWorkbook(wb, sheetName) {
  const ws = wb.Sheets[sheetName || wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

  const items = [];
  let cur = null;

  const itemRe = /^(\d+)\.\s+(.+?)\s+([\d,]+)\s*매/;

  rows.forEach((row, ri) => {
    const bVal = row[1];
    if (bVal && typeof bVal === 'string') {
      const bv = bVal.trim();
      const m = bv.match(itemRe);
      if (m) {
        if (cur) items.push(cur);
        cur = {
          num: parseInt(m[1]),
          name: m[2].trim(),
          qty: parseInt(m[3].replace(/,/g, '')),
          processes: [],
          total: null,
          unitPrice: null
        };
        return;
      }
      if (cur) {
        // 공정 파싱: F열(5) = 단가, D열(3) = 수량
        const fVal = row[5];
        if (bv && typeof fVal === 'number' && fVal > 100) {
          cur.processes.push({ name: bv, price: Math.round(fVal) });
        }
        // 합계: I열(8), 단가: J열(9)
        const iVal = row[8];
        const jVal = row[9];
        if (typeof iVal === 'number' && iVal > 50000) cur.total = Math.round(iVal);
        if (typeof jVal === 'number' && jVal > 0) cur.unitPrice = Math.round(jVal * 10) / 10;

        // H열에 합계가 있는 경우
        const hVal = row[7];
        if (typeof hVal === 'number' && hVal > 100000 && !cur.total) cur.total = Math.round(hVal);
      }
    }
  });
  if (cur) items.push(cur);

  // 단가 계산
  items.forEach(item => {
    if (item.total && item.qty) {
      item.unitPrice = Math.round(item.total / item.qty * 10) / 10;
    }
  });

  // 유효 필터
  return items.filter(i => i.total && i.total > 10000 && i.qty > 0);
}

function groupByName(items) {
  const g = {};
  items.forEach(item => {
    if (!g[item.name]) g[item.name] = [];
    g[item.name].push(item);
  });
  return g;
}

// ─────────────────────────────────────────────
// 파일 로드
// ─────────────────────────────────────────────
let loadedWb = null;

function loadFile(file) {
  const pw = document.getElementById('progressWrap');
  const pf = document.getElementById('progressFill');
  const pl = document.getElementById('progressLabel');
  pw.style.display = 'block';
  pf.style.width = '20%';
  pl.textContent = '파일 읽는 중...';

  const reader = new FileReader();
  reader.onload = (e) => {
    pf.style.width = '60%';
    pl.textContent = '시트 목록 확인 중...';
    setTimeout(() => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary' });
        loadedWb = wb;
        pf.style.width = '100%';
        pl.textContent = `${wb.SheetNames.length}개 시트 발견`;
        setTimeout(() => { pw.style.display = 'none'; }, 800);

        if (wb.SheetNames.length === 1) {
          // 시트가 하나면 바로 파싱
          processSheet(wb, wb.SheetNames[0]);
        } else {
          // 여러 시트면 선택 UI 표시
          renderSheetSelector(wb);
        }
      } catch(err) {
        pl.textContent = '오류: ' + err.message;
        console.error(err);
      }
    }, 50);
  };
  reader.readAsBinaryString(file);
}

function renderSheetSelector(wb) {
  const wrap = document.getElementById('sheetSelectWrap');
  const list = document.getElementById('sheetList');
  wrap.style.display = 'block';

  list.innerHTML = wb.SheetNames.map((name, idx) => `
    <button class="sheet-btn" data-sheet="${escapeAttr(name)}" onclick="onSheetClick('${escapeAttr(name)}')">
      <span class="sheet-icon">📄</span>
      <span class="sheet-name">${name}</span>
    </button>
  `).join('');
}

function onSheetClick(sheetName) {
  document.querySelectorAll('.sheet-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.sheet === sheetName);
  });
  processSheet(loadedWb, sheetName);
}

function processSheet(wb, sheetName) {
  const pw = document.getElementById('progressWrap');
  const pf = document.getElementById('progressFill');
  const pl = document.getElementById('progressLabel');
  pw.style.display = 'block';
  pf.style.width = '30%';
  pl.textContent = `"${sheetName}" 파싱 중...`;

  setTimeout(() => {
    try {
      const items = parseWorkbook(wb, sheetName);
      pf.style.width = '90%';
      pl.textContent = `${items.length}건 처리 중...`;
      setTimeout(() => {
        allItems = items;
        grouped = groupByName(items);
        pf.style.width = '100%';
        pl.textContent = `완료! ${Object.keys(grouped).length}개 품목 로드됨`;
        document.getElementById('totalCount').textContent = Object.keys(grouped).length;
        renderList('');
        setTimeout(() => { pw.style.display = 'none'; }, 1000);
      }, 100);
    } catch(err) {
      pl.textContent = '오류: ' + err.message;
      console.error(err);
    }
  }, 50);
}

// ─────────────────────────────────────────────
// 사이드바 렌더
// ─────────────────────────────────────────────
function renderList(query) {
  const list = document.getElementById('itemList');
  const q = query.toLowerCase().trim();

  const keys = Object.keys(grouped).filter(k =>
    !q || k.toLowerCase().includes(q)
  ).sort((a, b) => a.localeCompare(b, 'ko'));

  document.getElementById('resultCount').textContent =
    q ? `"${query}" 검색 결과 ${keys.length}건` : `전체 ${keys.length}개 품목`;

  if (!keys.length) {
    list.innerHTML = `<div class="empty-state"><div class="es-icon">🔍</div><div class="es-text">검색 결과가 없습니다</div></div>`;
    return;
  }

  list.innerHTML = keys.map(name => {
    const instances = grouped[name];
    const prices = instances.map(i => i.unitPrice).filter(Boolean);
    const avg = prices.length ? Math.round(prices.reduce((a,b)=>a+b,0)/prices.length) : null;
    const cnt = instances.length;

    const highlightedName = q
      ? name.replace(new RegExp(`(${escapeReg(query)})`, 'gi'), '<mark>$1</mark>')
      : name;

    return `
      <div class="item-card" data-name="${escapeAttr(name)}" onclick="selectItem('${escapeAttr(name)}')">
        <div class="item-card-name">${highlightedName}</div>
        <div class="item-card-meta">
          ${cnt > 1
            ? `<span class="badge badge-count">${cnt}회 제작</span><span class="badge badge-avg">평균 ${avg?.toLocaleString()}원</span>`
            : `<span class="badge badge-single">1회 제작</span>${avg ? `<span class="badge badge-avg">${avg?.toLocaleString()}원</span>` : ''}`
          }
        </div>
      </div>`;
  }).join('');
}

function escapeReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function escapeAttr(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

// ─────────────────────────────────────────────
// 상세 패널
// ─────────────────────────────────────────────
function selectItem(name) {
  currentGroup = name;

  // 활성 표시
  document.querySelectorAll('.item-card').forEach(c => {
    c.classList.toggle('active', c.dataset.name === name);
  });

  const instances = grouped[name];
  const prices = instances.map(i => i.unitPrice).filter(Boolean);
  const avg = prices.length ? prices.reduce((a,b)=>a+b,0)/prices.length : 0;
  const minP = Math.min(...prices);
  const maxP = Math.max(...prices);
  const totalQty = instances.reduce((s,i)=>s+i.qty,0);

  // 공정별 평균 집계
  const procMap = {};
  instances.forEach(inst => {
    inst.processes.forEach(p => {
      if (!procMap[p.name]) procMap[p.name] = [];
      procMap[p.name].push(p.price);
    });
  });
  const procAvg = Object.entries(procMap)
    .map(([n, prices]) => ({ name: n, avg: Math.round(prices.reduce((a,b)=>a+b,0)/prices.length) }))
    .sort((a,b) => b.avg - a.avg)
    .slice(0, 8);
  const maxProcAvg = procAvg[0]?.avg || 1;

  // 단가 범위 바 계산
  const rangeItems = instances.filter(i => i.unitPrice);
  const rangeMin = Math.min(...rangeItems.map(i=>i.unitPrice));
  const rangeMax = Math.max(...rangeItems.map(i=>i.unitPrice));
  const rangeSpan = rangeMax - rangeMin || 1;

  const dots = rangeItems.map(i => {
    const pct = rangeSpan > 0 ? ((i.unitPrice - rangeMin) / rangeSpan * 100) : 50;
    return `<div class="range-dot" style="left:${pct}%" data-tip="${i.unitPrice.toLocaleString()}원 (${i.qty.toLocaleString()}매)"></div>`;
  }).join('');
  const avgPct = rangeSpan > 0 ? ((avg - rangeMin) / rangeSpan * 100) : 50;

  document.getElementById('detailEmpty').style.display = 'none';
  const dc = document.getElementById('detailContent');
  dc.style.display = 'block';

  dc.innerHTML = `
    <div class="detail-header">
      <div class="detail-name">${name}</div>
      <div class="detail-chips">
        <span class="chip">제작 ${instances.length}회</span>
        <span class="chip">총 ${totalQty.toLocaleString()}매</span>
        <span class="chip">단가 범위 ${minP.toLocaleString()}~${maxP.toLocaleString()}원</span>
      </div>
    </div>

    <!-- 요약 카드 -->
    <div class="summary-grid">
      <div class="summary-card accent">
        <div class="sc-label">평균 단가</div>
        <div class="sc-value accent">${Math.round(avg).toLocaleString()}<span style="font-size:13px;font-weight:400"> 원</span></div>
        <div class="sc-sub">/매</div>
      </div>
      <div class="summary-card green">
        <div class="sc-label">최저 단가</div>
        <div class="sc-value green">${minP.toLocaleString()}<span style="font-size:13px;font-weight:400"> 원</span></div>
        <div class="sc-sub">최저가 기록</div>
      </div>
      <div class="summary-card yellow">
        <div class="sc-label">최고 단가</div>
        <div class="sc-value yellow">${maxP.toLocaleString()}<span style="font-size:13px;font-weight:400"> 원</span></div>
        <div class="sc-sub">최고가 기록</div>
      </div>
    </div>

    <!-- 단가 범위 -->
    ${rangeItems.length > 1 ? `
    <div class="price-range-section">
      <div class="section-title">단가 분포</div>
      <div class="price-range-bar-wrap">
        <div class="range-labels">
          <span class="range-label">최저 ${rangeMin.toLocaleString()}원</span>
          <span class="range-label" style="color:var(--yellow)">평균 ${Math.round(avg).toLocaleString()}원</span>
          <span class="range-label">최고 ${rangeMax.toLocaleString()}원</span>
        </div>
        <div class="range-track">
          <div class="range-fill" style="left:0;width:100%"></div>
        </div>
        <div class="range-dots">
          ${dots}
          <div class="range-avg-line" style="left:${avgPct}%" title="평균"></div>
        </div>
      </div>
    </div>` : ''}

    <!-- 공정별 평균 단가 -->
    ${procAvg.length ? `
    <div class="process-breakdown">
      <div class="section-title">공정별 평균 단가 (R당)</div>
      ${procAvg.map(p => `
        <div class="proc-row">
          <div class="proc-name">${p.name}</div>
          <div class="proc-bar-wrap"><div class="proc-bar" style="width:${Math.round(p.avg/maxProcAvg*100)}%"></div></div>
          <div class="proc-price">${p.avg.toLocaleString()}원</div>
        </div>
      `).join('')}
    </div>` : ''}

    <!-- 이력 테이블 -->
    <div class="section-title">제작 이력</div>
    <table class="history-table">
      <thead>
        <tr>
          <th>#</th>
          <th>수량</th>
          <th>총 금액</th>
          <th>매당 단가</th>
          <th>주요 공정</th>
        </tr>
      </thead>
      <tbody>
        ${instances.map((inst, idx) => {
          const up = inst.unitPrice || 0;
          const cls = up >= avg * 1.1 ? 'high' : up <= avg * 0.9 ? 'low' : 'mid';
          const procs = inst.processes.slice(0,5).map(p=>`<span class="proc-tag">${p.name}</span>`).join('');
          return `
            <tr>
              <td class="td-num">${idx+1}</td>
              <td class="td-qty">${inst.qty.toLocaleString()}매</td>
              <td class="td-total">${inst.total ? inst.total.toLocaleString()+'원' : '-'}</td>
              <td class="td-unit ${cls}">${up ? up.toLocaleString()+'원' : '-'}</td>
              <td class="td-process">${procs || '-'}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

// ─────────────────────────────────────────────
// 이벤트 바인딩
// ─────────────────────────────────────────────
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

searchInput.addEventListener('input', () => {
  const q = searchInput.value;
  searchClear.style.display = q ? 'block' : 'none';
  if (Object.keys(grouped).length) renderList(q);
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.style.display = 'none';
  renderList('');
});
</script>
</body>
</html>
