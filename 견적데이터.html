<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상자 견적 단가 검색</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;--surface:#181c27;--surface2:#1e2435;--border:#2a3048;
    --accent:#4f8ef7;--green:#3ecf8e;--yellow:#f5c842;--red:#f75a68;
    --text:#e8eaf0;--text2:#8890a8;--text3:#555e7a;
  }
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  .hdr{background:linear-gradient(135deg,#12162090,#1a1f3090);border-bottom:1px solid var(--border);
    padding:14px 20px;display:flex;align-items:center;gap:11px;
    position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
  .htit{font-size:16px;font-weight:700}
  .hsub{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px}
  .hbadge{margin-left:auto;background:var(--surface2);border:1px solid var(--border);
    border-radius:20px;padding:3px 12px;font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
  .hbadge b{color:var(--green)}

  .main{display:flex;height:calc(100vh - 53px)}

  /* 사이드바 */
  .sb{width:310px;min-width:310px;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden}

  .upz{margin:11px 11px 8px;border:2px dashed var(--border);border-radius:10px;
    padding:14px 12px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
  .upz:hover,.upz.drag{border-color:var(--accent);background:#4f8ef708}
  .upz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
  .upico{font-size:22px;margin-bottom:4px}
  .uptxt{font-size:12px;color:var(--text2);line-height:1.5}
  .uptxt strong{color:var(--accent)}
  .uphnt{font-size:9px;color:var(--text3);margin-top:3px;font-family:'IBM Plex Mono',monospace}

  .pw{margin:0 11px 8px;display:none}
  .pb{height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}
  .pf{height:100%;background:linear-gradient(90deg,var(--accent),#7c5af7);width:0%;transition:width .3s}
  .pl{font-size:9px;color:var(--text3);margin-top:3px;font-family:'IBM Plex Mono',monospace}

  .shw{margin:0 11px 7px;display:none}
  .shlbl{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:3px}
  .shlist{display:flex;flex-wrap:wrap;gap:2px;max-height:54px;overflow-y:auto}
  .shbtn{padding:2px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;
    cursor:pointer;font-size:10px;color:var(--text2);white-space:nowrap;transition:all .15s}
  .shbtn:hover{border-color:var(--accent);color:var(--text)}
  .shbtn.active{border-color:var(--accent);color:var(--accent);background:#4f8ef718}

  .srw{padding:0 11px 7px}
  .srb{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);
    border-radius:9px;padding:0 9px;gap:6px;transition:border-color .2s}
  .srb:focus-within{border-color:var(--accent)}
  .sri{flex:1;background:none;border:none;outline:none;color:var(--text);
    font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:8px 0}
  .sri::placeholder{color:var(--text3)}
  .src{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px;display:none}
  .src:hover{color:var(--text)}

  .rcnt{padding:0 11px 5px;font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace}

  .il{flex:1;overflow-y:auto;padding:0 5px 12px}
  .il::-webkit-scrollbar{width:3px}
  .il::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  /* 품목 그룹 헤더 */
  .ghdr{padding:9px 8px 3px;font-size:11px;font-weight:700;color:var(--text2);
    border-top:1px solid var(--border);margin-top:6px;display:flex;align-items:baseline;gap:5px}
  .ghdr:first-child{border-top:none;margin-top:0}
  .ghdr mark{background:none;color:var(--accent);font-weight:700}
  .gcnt{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-weight:400}

  /* ★ 건별 카드 1건씩 */
  .ic{padding:5px 8px 5px 14px;border-radius:6px;cursor:pointer;transition:all .12s;
    border:1px solid transparent;margin-bottom:1px;display:flex;align-items:center;gap:8px}
  .ic:hover{background:var(--surface2);border-color:var(--border)}
  .ic.active{background:#4f8ef710;border-color:#4f8ef738}
  .ic-left{flex:1;min-width:0}
  .ic-meta{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:2px}
  .ic-info{font-size:11px;color:var(--text2)}
  .ic-unit{font-size:13px;font-weight:700;font-family:'IBM Plex Mono',monospace;white-space:nowrap;flex-shrink:0}
  .ulo{color:var(--green)}.umd{color:var(--accent)}.uhi{color:var(--red)}

  .estat{padding:36px 12px;text-align:center;color:var(--text3)}
  .estat .ei{font-size:30px;margin-bottom:7px;opacity:.3}
  .estat .et{font-size:12px;line-height:1.8}

  /* 상세 패널 */
  .dp{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .demp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px}
  .demp .di{font-size:44px;opacity:.1}
  .demp .dt{font-size:15px;color:var(--text2);font-weight:500}
  .demp .dd{font-size:11px;text-align:center;line-height:1.8}
  .dc{flex:1;overflow-y:auto;padding:22px 26px;display:none}
  .dc::-webkit-scrollbar{width:3px}
  .dc::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .dname{font-size:19px;font-weight:700;letter-spacing:-.4px;margin-bottom:5px}
  .dchips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
  .chip{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 8px;
    border-radius:20px;border:1px solid var(--border);color:var(--text2)}

  .sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .scd{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}
  .scd.sa{border-color:#4f8ef760;background:#1a2540}
  .scd.sg{border-color:#3ecf8e60;background:#0f2a20}
  .scd.sy{border-color:#f5c84260;background:#2a2010}
  .slbl{font-size:10px;color:#c8cfe0;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:.3px}
  .sval{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace}
  .sval.ca{color:#7eb8ff}.sval.cg{color:#5ddfaa}.sval.cy{color:#fad95a}
  .ssub{font-size:10px;color:#c8cfe0;margin-top:3px}

  .stit{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;
    letter-spacing:1px;margin-bottom:8px;font-family:'IBM Plex Mono',monospace}

  .rw{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px}
  .rlr{display:flex;justify-content:space-between;margin-bottom:6px}
  .rlb{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2)}
  .rtr{height:5px;background:var(--surface2);border-radius:5px;position:relative}
  .rfi{position:absolute;top:0;height:100%;border-radius:5px;
    background:linear-gradient(90deg,var(--green),var(--accent),var(--yellow),var(--red));left:0;width:100%}
  .rds{position:relative;margin-top:4px;height:14px}
  .rdt{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--accent);
    transform:translateX(-50%);cursor:pointer;top:2px}
  .rdt:hover::after{content:attr(data-tip);position:absolute;bottom:11px;left:50%;
    transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);
    padding:2px 6px;border-radius:3px;font-size:9px;color:var(--text);
    font-family:'IBM Plex Mono',monospace;white-space:nowrap;z-index:10}
  .ravg{position:absolute;width:2px;height:14px;background:var(--yellow);
    transform:translateX(-50%);top:-2px;border-radius:2px}

  .tbl{width:100%;border-collapse:collapse;margin-bottom:16px}
  .tbl th{text-align:left;font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--text3);
    font-weight:500;padding:5px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
  .tbl td{padding:7px 8px;font-size:11px;border-bottom:1px solid #1e243522;vertical-align:middle}
  .tbl tr:hover td{background:var(--surface)}
  .tbl tr.me td{background:#4f8ef710}
  .tn{color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:9px}
  .tq{font-family:'IBM Plex Mono',monospace;color:var(--text2)}
  .tt{font-family:'IBM Plex Mono',monospace;color:var(--text)}
  .tu{font-family:'IBM Plex Mono',monospace;font-weight:700}
  .tu-hi{color:var(--red)}.tu-md{color:var(--accent)}.tu-lo{color:var(--green)}
  .tlink{cursor:pointer;color:var(--accent);text-decoration:underline}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="htit">📦 상자 견적 단가 검색</div>
    <div class="hsub">Box Cost Analyzer</div>
  </div>
  <div class="hbadge">전체 <b id="totalCount">0</b>건</div>
</div>

<div class="main">
  <div class="sb">
    <!-- 파일 업로드 -->
    <div class="upz" id="upz">
      <input type="file" id="fi" accept=".xlsx,.xls"/>
      <div class="upico">📂</div>
      <div class="uptxt"><strong>Excel 파일 드롭</strong><br>또는 클릭해서 선택</div>
      <div class="uphnt">*.xlsx / *.xls</div>
    </div>
    <div class="pw" id="pw"><div class="pb"><div class="pf" id="pf"></div></div><div class="pl" id="pl"></div></div>
    <div class="shw" id="shw"><div class="shlbl">📋 시트 선택</div><div class="shlist" id="shlist"></div></div>

    <div class="srw">
      <div class="srb">
        <span style="font-size:11px;color:var(--text3);flex-shrink:0">🔍</span>
        <input class="sri" id="si" placeholder="품목명 검색..."/>
        <button class="src" id="sc">✕</button>
      </div>
    </div>
    <div class="rcnt" id="rcnt"></div>
    <div class="il" id="il">
      <div class="estat"><div class="ei">📋</div><div class="et">Excel 파일을 업로드하면<br>목록이 표시됩니다</div></div>
    </div>
  </div>

  <div class="dp">
    <div class="demp" id="demp">
      <div class="di">📊</div>
      <div class="dt">건을 선택하세요</div>
      <div class="dd">왼쪽에서 건을 클릭하면<br>공정 내역과 동일품목 이력을 확인합니다</div>
    </div>
    <div class="dc" id="dc"></div>
  </div>
</div>

<script>
let allItems = [], grouped = {}, loadedWb = null, currentRow = null;

// ════════════════════════════════════════════
// 파싱 핵심:
// XLSX.js에서 셀값 읽는 방식 = ws[주소].v (캐시된 계산값)
// sheet_to_json raw:true 로 읽으면 수식셀도 .v 값으로 옴
// 단, 빈 행 사이에 있는 합계행(I열+K열)을 cur flush 전에 읽어야 함
// → 다음 품목헤더 만날 때만 flush
// ════════════════════════════════════════════
const ITEM_RE = /^\s*(?:\*{0,2}[^가-힣]*\/\/\s*)?\s*(?:\d+[.\)]\s*|[①-⑳]\s*)?(.+?)\s+([\d,]+)\s*(?:매|개)\s*$/;

function normalName(raw) {
  let s = raw.trim();
  s = s.replace(/^\*{0,2}[^가-힣]*\/\/\s*/, '');
  s = s.replace(/^\d+[.\)]\s*/, '');
  s = s.replace(/\s+[\d,]+\s*(?:매|개)\s*$/, '');
  return s.replace(/\s+/g, ' ').trim();
}

function gv(row, i) { return (row && row.length > i) ? row[i] : null; }

function asN(v) {
  if (typeof v === 'number' && isFinite(v) && v > 0) return v;
  if (typeof v === 'string') {
    const n = parseFloat(v.replace(/[,원\s]/g, ''));
    return (!isNaN(n) && n > 0) ? n : null;
  }
  return null;
}

function parseSheet(wb, sheetName) {
  // cellFormula:false, raw:true → 수식 결과 캐시값(.v)을 숫자로 읽음
  const ws = wb.Sheets[sheetName];

  // XLSX.utils.sheet_to_json 대신 셀 직접 접근으로 정확히 읽기
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');
  const maxRow = range.e.r;
  const rows = [];

  for (let r = 0; r <= maxRow; r++) {
    const row = [];
    for (let c = 0; c <= 12; c++) {
      const addr = XLSX.utils.encode_cell({r, c});
      const cell = ws[addr];
      // .v = 실제 계산값 (수식이든 상수든)
      row.push(cell ? cell.v : null);
    }
    rows.push(row);
  }

  const items = [];
  let cur = null;

  function flush() {
    if (!cur) return;
    if (!cur.unit && cur.total && cur.qty)
      cur.unit = Math.round(cur.total / cur.qty * 100) / 100;
    if (cur.total && cur.total > 1000)
      items.push(Object.assign({}, cur));
    cur = null;
  }

  for (let ri = 0; ri < rows.length; ri++) {
    const row = rows[ri];
    const b = gv(row, 1);
    const bStr = (b && typeof b === 'string') ? b.trim() : '';

    // 품목 헤더 감지 → flush 후 새 cur
    const m = bStr ? bStr.match(ITEM_RE) : null;
    if (m) {
      flush();
      let qty = parseInt(m[2].replace(/,/g, ''));
      const j9 = asN(gv(row, 9));
      if ((!qty || isNaN(qty)) && j9) qty = Math.round(j9);
      cur = { row: ri + 1, name: normalName(bStr), qty: qty || null,
              total: null, unit: null, processes: [] };
      continue;
    }

    // cur 살아있는 동안 — 빈 행 포함 모든 행 스캔
    if (cur) {
      const i8  = asN(gv(row, 8));   // I열: 최종합계
      const k10 = asN(gv(row, 10));  // K열: 매단가 (후기형)
      const h7  = asN(gv(row, 7));   // H열: 소계
      const j9  = asN(gv(row, 9));   // J열: 매단가 (초기형)
      const g6  = asN(gv(row, 6));   // G열: 공정금액 (후기형)
      const f5  = asN(gv(row, 5));   // F열: R단가

      // ① I열 최종합계 (가장 신뢰) + K열/J열 단가
      if (i8 && i8 > 1000) {
        cur.total = Math.round(i8);
        if (k10 && k10 > 0.1 && k10 < 500000)
          cur.unit = Math.round(k10 * 100) / 100;
        else if (j9 && j9 > 0.1 && j9 < 500000 && j9 !== cur.qty)
          cur.unit = Math.round(j9 * 100) / 100;
      }
      // ② H열만 있으면 소계/합계
      if (h7 && h7 > 1000 && !cur.total) cur.total = Math.round(h7);

      // ③ 공정 (B열 있을 때만)
      if (bStr && bStr.length < 35 && !bStr.includes('잡비') && !bStr.includes('%')) {
        const amt = g6 || h7;
        if (amt && amt > 0)
          cur.processes.push({ name: bStr, amt: Math.round(amt), unitPrice: f5 });
      }
    }
  }
  flush();
  return items;
}

function groupItems(items) {
  const g = {};
  items.forEach(it => {
    if (!g[it.name]) g[it.name] = [];
    g[it.name].push(it);
  });
  return g;
}

// ════════════════════════════════════════════
// 파일 로드
// ════════════════════════════════════════════
function setProg(p, l) {
  document.getElementById('pf').style.width = p + '%';
  document.getElementById('pl').textContent = l;
  document.getElementById('pw').style.display = 'block';
}
function hideProg() { setTimeout(() => document.getElementById('pw').style.display = 'none', 600); }

function loadFile(file) {
  setProg(10, '파일 읽는 중...');
  const reader = new FileReader();
  reader.onload = e => {
    setProg(40, '파싱 중...');
    setTimeout(() => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary' });
        loadedWb = wb;
        if (wb.SheetNames.length === 1) {
          processSheet(wb, wb.SheetNames[0]);
        } else {
          renderSheetSel(wb);
          hideProg();
        }
      } catch(err) { setProg(100, '오류: ' + err.message); }
    }, 30);
  };
  reader.readAsBinaryString(file);
}

function renderSheetSel(wb) {
  const w = document.getElementById('shw'), l = document.getElementById('shlist');
  w.style.display = 'block';
  l.innerHTML = wb.SheetNames.map(n =>
    `<button class="shbtn" data-s="${esc(n)}" onclick="onSheet('${esc(n)}')">${escH(n)}</button>`
  ).join('');
}
function onSheet(sn) {
  document.querySelectorAll('.shbtn').forEach(b => b.classList.toggle('active', b.dataset.s === sn));
  processSheet(loadedWb, sn);
}
function processSheet(wb, sn) {
  setProg(20, `"${sn}" 파싱 중...`);
  setTimeout(() => {
    try {
      const items = parseSheet(wb, sn);
      allItems = items;
      grouped = groupItems(items);
      document.getElementById('totalCount').textContent = items.length.toLocaleString();
      setProg(100, `완료! ${Object.keys(grouped).length}종 ${items.length}건`);
      hideProg();
      renderList('');
    } catch(err) { setProg(100, '오류: ' + err.message); console.error(err); }
  }, 30);
}

// ════════════════════════════════════════════
// 사이드바: 품목 그룹헤더 + 건별 카드 1건씩
// ════════════════════════════════════════════
function renderList(query) {
  const el = document.getElementById('il');
  const tokens = query.trim().toLowerCase().split(/\s+/).filter(Boolean);

  let names = Object.keys(grouped).filter(k =>
    !tokens.length || tokens.every(t => k.toLowerCase().includes(t))
  );
  names.sort((a, b) => grouped[a][0].row - grouped[b][0].row);

  const totalCnt = names.reduce((s, n) => s + grouped[n].length, 0);
  document.getElementById('rcnt').textContent =
    tokens.length ? `"${query}" — ${names.length}종 ${totalCnt}건` : `전체 ${names.length}종 ${totalCnt}건`;

  if (!names.length) {
    el.innerHTML = `<div class="estat"><div class="ei">🔍</div><div class="et">검색 결과가 없습니다</div></div>`;
    return;
  }

  const allPrices = names.flatMap(n => grouped[n].map(i => i.unit).filter(Boolean));
  const gMin = allPrices.length ? Math.min(...allPrices) : 0;
  const gMax = allPrices.length ? Math.max(...allPrices) : 0;
  const gSpan = gMax - gMin || 1;

  let html = '';
  names.forEach(name => {
    const insts = grouped[name];
    let hn = escH(name);
    if (tokens.length)
      tokens.forEach(t => { hn = hn.replace(new RegExp(`(${escReg(t)})`, 'gi'), '<mark>$1</mark>'); });

    html += `<div class="ghdr">${hn}<span class="gcnt">(${insts.length}건)</span></div>`;

    // ★ 1건씩 카드
    insts.forEach((inst, idx) => {
      const up = inst.unit || 0;
      const ratio = gSpan > 0 ? (up - gMin) / gSpan : 0.5;
      const ucls = ratio > 0.66 ? 'uhi' : ratio < 0.33 ? 'ulo' : 'umd';
      html +=
        `<div class="ic${inst.row === currentRow ? ' active' : ''}" data-row="${inst.row}" onclick="selectItem(${inst.row})">` +
          `<div class="ic-left">` +
            `<div class="ic-meta">${idx + 1}번째 · 행${inst.row}</div>` +
            `<div class="ic-info">${inst.qty ? inst.qty.toLocaleString() + '매' : '-'} · ${inst.total ? inst.total.toLocaleString() + '원' : '-'}</div>` +
          `</div>` +
          `<div class="ic-unit ${ucls}">${up ? up.toLocaleString() + '원' : '-'}</div>` +
        `</div>`;
    });
  });

  el.innerHTML = html;
}

// ════════════════════════════════════════════
// 상세 패널
// ════════════════════════════════════════════
function selectItem(rowNum) {
  currentRow = rowNum;
  document.querySelectorAll('.ic').forEach(c => c.classList.toggle('active', +c.dataset.row === rowNum));

  const item = allItems.find(i => i.row === rowNum);
  if (!item) return;

  const same = grouped[item.name] || [];
  const prices = same.map(i => i.unit).filter(Boolean);
  const avg  = prices.length ? prices.reduce((a, b) => a + b, 0) / prices.length : 0;
  const minP = prices.length ? Math.min(...prices) : 0;
  const maxP = prices.length ? Math.max(...prices) : 0;
  const up   = item.unit || 0;
  const myIdx = same.findIndex(i => i.row === rowNum);

  const rspan = maxP - minP || 1;
  const dots = same.filter(i => i.unit).map(i => {
    const pct = ((i.unit - minP) / rspan * 100).toFixed(1);
    const isMe = i.row === rowNum;
    return `<div class="rdt" style="left:${pct}%;background:${isMe ? 'var(--yellow)' : 'var(--accent)'};${isMe ? 'width:8px;height:8px;top:1px;' : ''}" data-tip="${i.unit?.toLocaleString()}원 (행${i.row})"></div>`;
  }).join('');
  const avgPct = avg ? ((avg - minP) / rspan * 100).toFixed(1) : 50;

  document.getElementById('demp').style.display = 'none';
  const dc = document.getElementById('dc');
  dc.style.display = 'block';

  dc.innerHTML =
    `<div class="dname">${escH(item.name)}</div>` +
    `<div class="dchips">` +
      `<span class="chip">행 ${item.row}</span>` +
      `<span class="chip">${item.qty ? item.qty.toLocaleString() + '매' : '-'}</span>` +
      `<span class="chip">합계 ${item.total ? item.total.toLocaleString() + '원' : '-'}</span>` +
      (same.length > 1 ? `<span class="chip">동일품목 ${same.length}건 중 ${myIdx + 1}번째</span>` : '') +
    `</div>` +

    `<div class="sgrid">` +
      `<div class="scd sa"><div class="slbl">이 건 단가</div><div class="sval ca">${up ? up.toLocaleString() : '-'}<span style="font-size:10px;font-weight:400"> 원/매</span></div><div class="ssub">합계÷수량</div></div>` +
      `<div class="scd sg"><div class="slbl">동일품목 최저</div><div class="sval cg">${minP ? minP.toLocaleString() : '-'}<span style="font-size:10px;font-weight:400"> 원</span></div><div class="ssub">${same.length}건 기준</div></div>` +
      `<div class="scd sy"><div class="slbl">동일품목 평균</div><div class="sval cy">${avg ? Math.round(avg).toLocaleString() : '-'}<span style="font-size:10px;font-weight:400"> 원</span></div><div class="ssub">최고 ${maxP ? maxP.toLocaleString() : '-'}원</div></div>` +
    `</div>` +

    (same.length > 1 ?
      `<div class="stit">동일품목 단가 분포 <span style="color:var(--yellow)">●</span> 현재 건</div>` +
      `<div class="rw">` +
        `<div class="rlr"><span class="rlb">최저 ${minP.toLocaleString()}원</span><span class="rlb" style="color:var(--yellow)">평균 ${Math.round(avg).toLocaleString()}원</span><span class="rlb">최고 ${maxP.toLocaleString()}원</span></div>` +
        `<div class="rtr"><div class="rfi"></div></div>` +
        `<div class="rds">${dots}<div class="ravg" style="left:${avgPct}%"></div></div>` +
      `</div>` : '') +

    (item.processes && item.processes.length ?
      `<div class="stit">공정 내역</div>` +
      `<table class="tbl"><thead><tr><th>공정명</th><th>R·매 단가</th><th>금액</th></tr></thead><tbody>` +
      item.processes.map(p =>
        `<tr><td>${escH(p.name)}</td><td class="tn">${p.unitPrice ? p.unitPrice.toLocaleString() : '기본'}</td><td class="tt">${p.amt ? p.amt.toLocaleString() + '원' : '-'}</td></tr>`
      ).join('') + `</tbody></table>` : '') +

    (same.length > 1 ?
      `<div class="stit">동일품목 전체 이력 — ${same.length}건 · 건별 단가</div>` +
      `<table class="tbl"><thead><tr><th>#</th><th>행</th><th>수량</th><th>합계금액</th><th>매당 단가</th></tr></thead><tbody>` +
      same.map((inst, idx) => {
        const u = inst.unit || 0;
        const cls = avg && u >= avg * 1.1 ? 'tu-hi' : avg && u <= avg * 0.9 ? 'tu-lo' : 'tu-md';
        const isMe = inst.row === rowNum;
        return `<tr${isMe ? ' class="me"' : ''}>` +
          `<td class="tn">${idx + 1}</td>` +
          `<td class="tn tlink" onclick="selectItem(${inst.row})">${inst.row}</td>` +
          `<td class="tq">${inst.qty ? inst.qty.toLocaleString() + '매' : '-'}</td>` +
          `<td class="tt">${inst.total ? inst.total.toLocaleString() + '원' : '-'}</td>` +
          `<td class="tu ${cls}">${u ? u.toLocaleString() + '원' : '-'}${isMe ? ' ◀' : ''}</td></tr>`;
      }).join('') + `</tbody></table>` : '');
}

function escReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function esc(s)    { return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function escH(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 이벤트
document.getElementById('fi').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
const uz = document.getElementById('upz');
uz.addEventListener('dragover', e => { e.preventDefault(); uz.classList.add('drag'); });
uz.addEventListener('dragleave', () => uz.classList.remove('drag'));
uz.addEventListener('drop', e => { e.preventDefault(); uz.classList.remove('drag'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
const siEl = document.getElementById('si'), scEl = document.getElementById('sc');
siEl.addEventListener('input', () => { scEl.style.display = siEl.value ? 'block' : 'none'; if (allItems.length) renderList(siEl.value); });
scEl.addEventListener('click', () => { siEl.value = ''; scEl.style.display = 'none'; renderList(''); });
</script>
</body>
</html>
