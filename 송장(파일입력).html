<!DOCTYPE html>
<html>
<head>
  <title>송장(파일입력)</title>
  <meta charset="utf-8" />

  <!-- SheetJS 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; }
    h1 { text-align: center; margin-bottom: 5px; }

    .top-bar {
      width: 95%; margin: 10px auto;
      display: flex; justify-content: space-between; align-items: center;
    }

    #clock { font-size: 15px; color: #0e0d0d; margin-left: auto; margin-right: 1cm; }

    .download-btn {
      padding: 6px 16px; font-size: 14px; font-weight: bold;
      background: #007bff; color: white; border: none;
      border-radius: 4px; cursor: pointer;
    }
    .download-btn:hover { background: #0056b3; }

    .table-wrapper {
      width: 95%; height: 730px; overflow-y: auto;
      margin: auto; border: 1px solid #ccc;
    }

    table { width: 100%; border-collapse: collapse; }

    th, td {
      border: 1px solid #ccc; padding: 6px; text-align: center;
      font-size: 12px; font-weight: 350; color: #070707;
    }

    td:focus { outline: 2px solid #4CAF50; background-color: #f0fff4; }
    td:nth-child(3), td:nth-child(9) { text-align: left; padding-left: 8px; }

    th:nth-child(1) { width: 9%; }  th:nth-child(2) { width: 4%; }
    th:nth-child(3) { width: 22%; } th:nth-child(4) { width: 7%; }
    th:nth-child(5) { width: 7%; }  th:nth-child(6) { width: 4%; }
    th:nth-child(7) { width: 4%; }  th:nth-child(8) { width: 4%; }
    th:nth-child(9) { width: 22%; }

    thead th {
      position: sticky; top: 0; background-color: powderblue; z-index: 2;
      font-size: 16px; font-weight: 400; letter-spacing: 1px; padding: 7px 7px;
    }

    tr:hover { background-color: #f5f5f5; }
    tr.selected-row { background-color: #e8f5e9 !important; }
    tr:nth-child(even) td { background-color: #f0f0f0; }
  </style>
</head>
<body>

  <h1>송장(파일입력)</h1>

  <div class="top-bar">
    <button class="download-btn" onclick="downloadExcel()">📥 엑셀 다운로드</button>
    <div id="clock"></div>
  </div>

  <div class="table-wrapper">
    <table data-gm-table>
      <thead>
        <tr>
          <th>상  호
            <div id="nameCount" style="font-size:12px;color:blue;font-weight:400;margin-top:4px;">0</div>
          </th>
          <th>우편번호</th>
          <th>주&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;소</th>
          <th>휴 대 폰</th>
          <th>전   화</th>
          <th>택배수
            <div id="grandTotal" style="font-size:12px;color:red;font-weight:400;margin-top:4px;">0</div>
          </th>
          <th>단 가</th>
          <th>선/착불</th>
          <th>상&nbsp;&nbsp;&nbsp;품&nbsp;&nbsp;&nbsp;명</th>
        </tr>
      </thead>
      <tbody id="orderTable"></tbody>
    </table>
  </div>

  <script>
  // ── 시계 ──
  function clock() {
    var t=new Date(), week=["일","월","화","수","목","금","토"];
    var pad=v=>v<10?"0"+v:v;
    document.getElementById("clock").innerText=
      (t.getMonth()+1)+"월 "+t.getDate()+"일 "+week[t.getDay()]+"요일 "+
      pad(t.getHours())+":"+pad(t.getMinutes())+":"+pad(t.getSeconds());
  }
  clock(); setInterval(clock,1000);

  // ── 합계 / 건수 ──
  function updateSummary() {
    let total=0, nameCount=0;
    document.querySelectorAll("#orderTable tr").forEach(row=>{
      if(row.cells[0]?.innerText.trim()!=="") nameCount++;
      const v=parseFloat((row.cells[5]?.innerText||"").replace(/,/g,"").trim());
      if(!isNaN(v)) total+=v;
    });
    document.getElementById("grandTotal").innerText=total.toLocaleString();
    document.getElementById("nameCount").innerText=nameCount.toLocaleString();
  }

  // ── 착불 색상 ──
  function updatePaymentColor() {
    document.querySelectorAll("#orderTable tr").forEach(row=>{
      const cell=row.cells[7]; if(!cell) return;
      if(cell.innerText.trim()==="착불"){cell.style.color="red";cell.style.fontWeight="normal";}
      else{cell.style.color="";cell.style.fontWeight="";}
    });
  }

  // ── ★ 엑셀 다운로드 ──
  function downloadExcel() {
    const rows=[];

    // 헤더
    rows.push(["상호","우편번호","주소","휴대폰","전화","택배수","단가","선/착불","상품명"]);

    // 데이터 (빈 행 제외)
    document.querySelectorAll("#orderTable tr").forEach(row=>{
      const name=row.cells[0]?.innerText.trim();
      if(!name) return; // 상호 없으면 건너뜀
      rows.push([
        name,
        row.cells[1]?.innerText.trim()||"",
        row.cells[2]?.innerText.trim()||"",
        row.cells[3]?.innerText.trim()||"",
        row.cells[4]?.innerText.trim()||"",
        row.cells[5]?.innerText.trim()||"",
        row.cells[6]?.innerText.trim()||"",
        row.cells[7]?.innerText.trim()||"",
        row.cells[8]?.innerText.trim()||"",
      ]);
    });

    if(rows.length<=1){ alert("다운로드할 데이터가 없어요."); return; }

    // SheetJS로 xlsx 생성
    const ws=XLSX.utils.aoa_to_sheet(rows);

    // 열 너비 설정
    ws["!cols"]=[
      {wch:15},{wch:8},{wch:30},{wch:14},{wch:14},
      {wch:6},{wch:8},{wch:8},{wch:30}
    ];

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "송장");

    // 파일명: 날짜시간택배.xlsx
    const now=new Date();
    const pad=v=>v<10?"0"+v:v;
    const fname=
      now.getFullYear()+
      pad(now.getMonth()+1)+
      pad(now.getDate())+
      pad(now.getHours())+
      pad(now.getMinutes())+
      "택배.xlsx";

    XLSX.writeFile(wb, fname);
  }

  // ── 발송선택 데이터 로드 ──
  function loadPackData() {
  const saved=localStorage.getItem("packData"); if(!saved) return;
  const data=JSON.parse(saved).filter(item=>
    item.cargo!=="화물" && item.cargoEx!=="화택" && !item.is3PL
  );
  const tbody=document.getElementById("orderTable");

  // ★ 필요한 행 수만큼만 생성 (데이터 + 여유 10행)
  const neededRows = Math.max(data.length + 10, 30);
  let html="";
  for(let i=0;i<neededRows;i++){
    html+="<tr>";
    for(let j=0;j<9;j++) html+="<td contenteditable='true'></td>";
    html+="</tr>";
  }
  tbody.innerHTML=html;

  data.forEach((item,i)=>{
    const row=tbody.rows[i]; if(!row) return;
    row.cells[0].innerText=item.name   ||"";
    row.cells[2].innerText=item.addr   ||"";
    row.cells[3].innerText=item.mobile ||"";
    row.cells[4].innerText=item.tel    ||"";
    row.cells[5].innerText=item.count  ||"";
    row.cells[6].innerText=item.price  ||"";
    row.cells[7].innerText=item.pay    ||"";
    row.cells[8].innerText=item.item   ||"";
  });
  updateSummary();
  updatePaymentColor();
}

  // ── DOMContentLoaded ──
  document.addEventListener("DOMContentLoaded", function() {
    const tbody=document.getElementById("orderTable");
    loadPackData();

    tbody.addEventListener("paste",function(e){
      e.preventDefault();
      const text=(e.clipboardData||window.clipboardData).getData("text");
      const startCell=document.activeElement;
      const startRow=startCell.parentElement.rowIndex-1, startCol=startCell.cellIndex;
      text.split("\n").forEach((rowText,i)=>{
        rowText.split("\t").forEach((colText,j)=>{
          const row=document.querySelectorAll("#orderTable tr")[startRow+i];
          if(row?.cells[startCol+j]) row.cells[startCol+j].innerText=colText.trim();
        });
      });
      setTimeout(()=>{updateSummary();updatePaymentColor();},50);
    });

    tbody.addEventListener("blur",function(e){
      if(e.target.tagName!=="TD"||e.target.cellIndex!==6) return;
      const v=e.target.innerText.replace(/,/g,"").trim();
      if(!isNaN(v)&&v!=="") e.target.innerText=Number(v).toLocaleString();
    },true);

    let lastSelectedRow=null;
    tbody.addEventListener("focusin",function(e){
      if(e.target.tagName!=="TD") return;
      if(lastSelectedRow) lastSelectedRow.classList.remove("selected-row");
      e.target.parentElement.classList.add("selected-row");
      lastSelectedRow=e.target.parentElement;
      setTimeout(()=>{
        const range=document.createRange(); range.selectNodeContents(e.target);
        const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
      },0);
    });

    tbody.addEventListener("input",function(e){
      if(e.target.tagName!=="TD") return;
      const ci=e.target.cellIndex;
      if(ci===0||ci===5) updateSummary();
      if(ci===7) updatePaymentColor();
    });

    tbody.addEventListener("dragstart",function(e){e.preventDefault();});
  });

  // ── Ctrl+Z undo ──
  const undoStack=[];
  document.addEventListener("DOMContentLoaded", function() {
    const tbody=document.getElementById("orderTable");
    tbody.addEventListener("focusin",function(e){
      if(e.target.tagName!=="TD") return;
      e.target.dataset.before=e.target.innerText;
    });
    tbody.addEventListener("input",function(e){
      if(e.target.tagName!=="TD") return;
      const before=e.target.dataset.before??"", after=e.target.innerText;
      if(before!==after){ undoStack.push({cell:e.target,before,after}); e.target.dataset.before=after; }
    });
  });
  document.addEventListener("keydown",function(e){
    if(!(e.ctrlKey||e.metaKey)||e.key!=="z") return;
    if(!undoStack.length) return;
    e.preventDefault();
    const {cell,before}=undoStack.pop();
    cell.innerText=before; cell.dataset.before=before;
  });

  window.addEventListener("load",loadPackData);
  window.addEventListener("pageshow",loadPackData);
  window.addEventListener("focus",loadPackData);
  </script>

  <script src="버튼.js"></script>
</body>
</html>
