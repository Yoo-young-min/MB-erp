<!DOCTYPE html>
<html>
<head>
  <title>쇼핑몰품목만(당일)</title>
  <meta charset="utf-8" />
  <style>
    body { font-family: Arial; }
    h1 { text-align: center; margin-bottom: 5px; }
    .top-bar { width: 95%; margin: 10px auto; display: flex; justify-content: space-between; align-items: center; }
    #clock { font-size: 15px; color: #0e0d0d; margin-left: auto; margin-right: 1cm; }
    #checkBar { width: 95%; margin: 0 auto 6px auto; padding: 4px 10px; background: #fff3e0; border: 1px solid #ffcc80; border-radius: 4px; font-size: 12px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    #checkBar span { font-weight: bold; }
    #checkBar .ok { color: #28a745; }
    #checkBar .warn { color: #dc3545; }
    .table-wrapper { width: 95%; height: 730px; overflow-y: auto; margin: auto; border: 1px solid #ccc; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: center; font-size: 10px; font-weight: 300; color: #070707; }
    td:focus { outline: 2px solid #4CAF50; background-color: #f0fff4; }
    #orderTable th, #orderTable td { vertical-align: middle; }
    th:nth-child(1){width:1%} th:nth-child(2){width:1%} th:nth-child(3){width:2.5%} th:nth-child(4){width:2.5%}
    th:nth-child(5){width:1%} th:nth-child(6){width:2.5%} th:nth-child(7){width:1%} th:nth-child(8){width:1%}
    th:nth-child(9){width:1%} th:nth-child(10){width:2%} th:nth-child(11){width:1%} th:nth-child(12){width:2%}
    th:nth-child(13){width:1%} th:nth-child(14){width:2.5%} th:nth-child(15){width:12%} th:nth-child(16){width:1%}
    th:nth-child(17){width:2.5%} th:nth-child(18){width:2.5%} th:nth-child(19){width:1%} th:nth-child(20){width:3.5%}
    th:nth-child(21){width:3%} th:nth-child(22){width:2.5%} th:nth-child(23){width:2%} th:nth-child(24){width:3.5%}
    thead th { position: sticky; top: 0; background-color: #ffe0b2; z-index: 2; font-size: 12px; font-weight: 400; letter-spacing: 1px; padding: 7px 7px; }
    th:nth-child(24) { padding: 2px 1px; }
    @media print {
      thead th { background-color: #ffe0b2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .print-btn, .refresh-btn { display:none; }
    }
    tr:hover { background-color: #f5f5f5; }
    tr.selected-row { background-color: #e8f5e9 !important; }
    tr:nth-child(even) td { background-color: #f0f0f0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    td.warn-no-product { color: #dc3545 !important; font-weight: bold; }
    tr.warn-empty td:nth-child(17), tr.warn-empty td:nth-child(18) { background-color: #ffc107 !important; }
    .print-btn { background:#4CAF50; color:white; border:none; padding:6px 16px; font-size:15px; cursor:pointer; border-radius:4px; }
    .refresh-btn { background:#2196F3; color:white; border:none; padding:6px 16px; font-size:15px; cursor:pointer; border-radius:4px; margin-left:8px; }
  </style>
</head>
<body>
  <h1>쇼핑몰품목만(당일누적)</h1>
  <div class="top-bar">
    <div>
      <button class="print-btn" onclick="window.print()">인쇄</button>
      <button class="refresh-btn" onclick="loadAccumData()">새로고침</button>
    </div>
    <div id="clock"></div>
  </div>
  <div id="checkBar">
    <span>당일 누적:</span>
    <span>현재: <b id="chk-cur-n">0</b>건</span>
    <span id="chk-empty">⚠ 수량/단가 누락: <b id="chk-empty-n">0</b>건</span>
    <span style="margin-left:auto;">합계 공급가액: <b id="chk-supply-total" style="color:red;">0</b></span>
  </div>
  <div class="table-wrapper">
    <table data-gm-table>
      <thead>
        <tr>
          <th>일자</th><th>순번</th><th>거래처코드</th><th>거래처명</th>
          <th>담당</th><th>출하창고</th><th>거래유형</th><th>통화</th>
          <th>환율</th><th>미수금</th><th>부서</th><th>입금자및기타</th>
          <th>공지</th><th>품목코드</th><th>품  목  명</th><th>규격</th>
          <th>수량</th><th>단가</th><th>외화금액</th><th>공급가액</th>
          <th>부가세</th><th>거래명세서메모</th><th>생산전표생성</th>
          <th><div id="grandTotal" style="font-size:10px;color:red;font-weight:400;margin-top:4px;">0</div></th>
        </tr>
      </thead>
      <tbody id="orderTable"></tbody>
    </table>
  </div>
  <script>

  // ★ 차수별 색상
  function getRoundColor(round) {
  const colors = ["#000000","#0066cc","#007700","#cc6600","#cc0077"];
  return colors[(round-1) % colors.length];
}
  function clock() {
    var t=new Date(), week=["일","월","화","수","목","금","토"];
    var pad=v=>v<10?"0"+v:v;
    document.getElementById("clock").innerText=(t.getMonth()+1)+"월 "+t.getDate()+"일 "+week[t.getDay()]+"요일 "+pad(t.getHours())+":"+pad(t.getMinutes())+":"+pad(t.getSeconds());
  }
  clock(); setInterval(clock,1000);

  function calcRow(row) {
    const qty=parseFloat(row.cells[16].innerText.replace(/,/g,""))||0;
    const price=parseFloat(row.cells[17].innerText.replace(/,/g,""))||0;
    const total=qty*price;
    if(total>0){
      const supply=Math.round(total/1.1), vat=total-supply;
      row.cells[19].innerText=supply.toLocaleString();
      row.cells[20].innerText=vat.toLocaleString();
      row.cells[23].innerText=total.toLocaleString();
    } else { row.cells[19].innerText=""; row.cells[20].innerText=""; row.cells[23].innerText=""; }
  }

  function updateSummary() {
    let curCount=0, emptyCount=0, sum=0;
    document.querySelectorAll("#orderTable tr").forEach(row=>{
      const item=row.cells[14]?.innerText.trim(); if(!item) return;
      curCount++;
      const qty=(row.cells[16]?.innerText||"").trim();
      const price=(row.cells[17]?.innerText||"").trim();
      if(!qty||!price){ row.classList.add("warn-empty"); emptyCount++; } else { row.classList.remove("warn-empty"); }
      const v=parseFloat((row.cells[23]?.innerText||"").replace(/,/g,""))||0; sum+=v;
    });
    document.getElementById("chk-cur-n").textContent=curCount;
    const emEl=document.getElementById("chk-empty");
    document.getElementById("chk-empty-n").textContent=emptyCount;
    emEl.className=emptyCount>0?"warn":"ok";
    document.getElementById("chk-supply-total").textContent=sum.toLocaleString();
    document.getElementById("grandTotal").innerText=sum.toLocaleString();
  }

  function loadAccumData() {
  const today = new Date().toLocaleDateString('ko-KR');
  const savedDate = localStorage.getItem("shopItemAccumDate");
  if(savedDate && savedDate !== today){
    localStorage.removeItem("shopItemAccumData");
    localStorage.removeItem("shopItemAccumDate");
  }
  localStorage.setItem("shopItemAccumDate", today);
  const productRaw = localStorage.getItem("productListData");
  const productData = productRaw ? JSON.parse(productRaw) : [];
  const excludedRaw = localStorage.getItem("packExcludedKeys");
  const excludedSet = new Set(excludedRaw ? JSON.parse(excludedRaw) : []);
  const productMap = new Map();
  productData.forEach(p=>{
    const name=(p[0]||"").trim().toLowerCase(), code=(p[4]||"").trim(), price=(p[5]||"").trim();
    if(name) productMap.set(name, {code, price});
  });

  // ★ 이전 차수 누적 데이터
  const accumData = JSON.parse(localStorage.getItem("shopItemAccumData")||"[]");

  // ★ 현재 차수 데이터 (쇼핑몰품목만과 동일하게 shopOrderData 실시간)
  const currentRound = parseInt(localStorage.getItem("packRound")||"1");
  const shopOrderDate = localStorage.getItem("shopOrderDate");
  const shopRaw = shopOrderDate === today ? localStorage.getItem("shopOrderData") : null;
  const currentItems = [];
  if(shopRaw){
    JSON.parse(shopRaw).forEach(rowData=>{
      const name=(rowData[0]||"").trim(), mobile=(rowData[1]||"").trim();
      const addr=(rowData[3]||"").trim(), itemName=(rowData[4]||"").trim();
      const realQty=(rowData[9]||"").trim();
      if(!itemName) return;
      const excludeKey=name+"|"+mobile+"|"+addr+"|"+itemName;
      if(excludedSet.has(excludeKey)) return;
      currentItems.push({ itemName, realQty, round: currentRound });
    });
  }

  // ★ 이전 차수 + 현재 차수 합치기
  const allItems = [...accumData, ...currentItems];
  if(!allItems.length){ buildRows(50); updateSummary(); return; }

  buildRows(Math.max(50, allItems.length + 10));
  const rows = document.getElementById("orderTable").querySelectorAll("tr");

  allItems.forEach((d, i) => {
    const row = rows[i]; if(!row) return;
    const color = getRoundColor(d.round||1);
    Array.from(row.cells).forEach(td => { td.style.color = color; });
    const itemName = d.itemName||"";
    const realQty = d.realQty||"";
    row.cells[14].innerText = itemName;
    const qty = parseFloat(realQty.replace(/,/g,""))||0;
    row.cells[16].innerText = qty > 0 ? qty.toLocaleString() : "";
    const matched = productMap.get(itemName.toLowerCase());
    if(matched){
      row.cells[13].innerText = matched.code;
      const price = parseFloat(matched.price.replace(/,/g,""))||0;
      row.cells[17].innerText = price > 0 ? price.toLocaleString() : "";
    }
    calcRow(row);
  });

  updateSummary();
}

  function buildRows(count) {
    const tbody = document.getElementById("orderTable");
    tbody.innerHTML = "";
    const frag = document.createDocumentFragment();
    for(let i=0;i<count;i++){
      const tr = document.createElement("tr");
      for(let j=0;j<24;j++){
        const td = document.createElement("td");
        td.contentEditable = "true";
        if(j===2) td.innerText="111111";
        else if(j===3) td.innerText="쇼핑몰";
        else if(j===4) td.innerText="00006";
        else if(j===5) td.innerText="00001";
        else if(j===6) td.innerText="11";
        tr.appendChild(td);
      }
      frag.appendChild(tr);
    }
    tbody.appendChild(frag);
  }

  document.addEventListener("DOMContentLoaded", function(){
    const tbody = document.getElementById("orderTable");
    buildRows(50); // 초기 50행만 생성
    loadAccumData();

    let lastSelectedRow=null;
    tbody.addEventListener("focusin",function(e){
      if(e.target.tagName!=="TD") return;
      if(lastSelectedRow) lastSelectedRow.classList.remove("selected-row");
      e.target.parentElement.classList.add("selected-row");
      lastSelectedRow=e.target.parentElement;
    });

    tbody.addEventListener("blur",function(e){
      if(e.target.tagName!=="TD") return;
      const col=e.target.cellIndex;
      if([16,17,19,20,23].includes(col)){ const v=e.target.innerText.replace(/,/g,"").trim(); if(!isNaN(v)&&v!=="") e.target.innerText=Number(v).toLocaleString(); }
    },true);

    tbody.addEventListener("input",function(e){
      if(e.target.tagName!=="TD") return;
      const col=e.target.cellIndex;
      if(col===16||col===17){ calcRow(e.target.parentElement); }
      updateSummary();
    });

    tbody.addEventListener("dragstart",function(e){e.preventDefault();});
  });

  window.addEventListener("load", loadAccumData);
  window.addEventListener("pageshow", loadAccumData);
  window.addEventListener("focus", loadAccumData);
  </script>
  <script src="버튼.js"></script>
</body>
</html>
