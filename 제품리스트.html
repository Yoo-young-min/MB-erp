<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>제품리스트</title>
<style>
body { font-family:Arial; margin:0; }
h1 { text-align:center; margin-bottom:5px; }
.table-wrapper { width:calc(100% - 2cm); margin:0 auto; height:730px; overflow-y:auto; border:1px solid #ccc; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:6px; font-size:11px; text-align:center; min-width:40px; }
thead th { position:sticky; top:0; background:powderblue; font-size:13px; font-weight:390; z-index:1; }
td { outline:none; cursor:cell; user-select:none; }
td:nth-child(6) { background-color: #f0f0f0; font-weight:800; }
td.active { outline:2px solid #4CAF50; background:#f0fff4 !important; cursor:text; user-select:text; }
tr.selected-row { background:#e8f5e9; }
td.sel { background:#cfe8ff !important; outline:1px solid #4dabf7; }
button { padding:10px 20px; margin:10px; background:#28a745; font-size:14px; font-weight:700; color:white; border:none; border-radius:7px; cursor:pointer; }
.top-bar { width:calc(100% - 2cm); margin:auto; display:flex; justify-content:flex-end; }
.bottom-nav { position:fixed; bottom:0; left:0; width:100%; padding:8px 0; background:#f4f4f4; display:flex; justify-content:center; z-index:9999; }
.nav-container { display:flex; flex-wrap:wrap; gap:8px; max-width:800px; justify-content:center; }
.bottom-nav button { background-color:#d6ebf5; color:black; border:none; font-size:14px; font-weight:350; padding:6px 8px; border-radius:4px; cursor:pointer; }
.bottom-nav button:hover { opacity:0.85; }
@media print { .bottom-nav { display:none !important; } }
</style>
</head>
<body>
<h1>제품리스트</h1>
<div class="top-bar">
  <button onclick="downloadCSV()">백업 저장하기</button>
  <button onclick="restoreProductBackup()" style="background:#007bff;">백업 복구</button>
</div>
<div class="table-wrapper">
  <table id="mainTable">
    <thead>
      <tr>
        <th>쇼핑몰 품목명</th><th>단위</th><th>비교</th><th>이카운트 품목명</th>
        <th>코드</th><th>단가</th><th>가로</th><th>세로</th><th>높이</th><th>CBM</th>
        <th>세트 여부</th><th>세트코드</th><th>구성품코드</th><th>구성품수량</th><th>제품위치</th>
      </tr>
    </thead>
    <tbody id="orderTable"></tbody>
  </table>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const tbody = document.getElementById("orderTable");
  const COLS=15, MIN_ROWS=20, EXTRA=10, BATCH=10;
  const undoStack=[];
  let saveTimer=null, activeCell=null, lastRow=null;
  let dragStart=null, dragEnd=null, isMouseDown=false;

  // ── localStorage ──
  let savedData=[];
  try { const r=localStorage.getItem("productListData"); if(r) savedData=JSON.parse(r); } catch{}

  function makeRow(data) {
    const tr=document.createElement("tr");
    for(let j=0;j<COLS;j++){
      const td=document.createElement("td");
      // ★ contentEditable은 active 클래스 있을 때만 — 기본은 false
      td.contentEditable="false";
      td.spellcheck=false;
      td.tabIndex=-1;
      if(data?.[j]) td.textContent=data[j];
      tr.appendChild(td);
    }
    return tr;
  }

  const frag=document.createDocumentFragment();
  const initRows=Math.max(MIN_ROWS, savedData.length+EXTRA);
  for(let i=0;i<initRows;i++) frag.appendChild(makeRow(savedData[i]));
  tbody.appendChild(frag);
  requestAnimationFrame(()=>{ for(let i=0;i<savedData.length;i++) updateRow(tbody.rows[i]); });

  function updateRow(row) {
    if(!row) return;
    const w=parseFloat(row.cells[6]?.textContent)||0;
    const l=parseFloat(row.cells[7]?.textContent)||0;
    const h=parseFloat(row.cells[8]?.textContent)||0;
    row.cells[9].textContent=(w&&l&&h)?((w/1000)*(l/1000)*(h/1000)).toFixed(6):"";
    const shop=(row.cells[0]?.textContent||"").trim();
    const ec=(row.cells[3]?.textContent||"").trim();
    const cmp=row.cells[2];
    if(cmp){ cmp.textContent=(shop&&ec&&shop!==ec)?"다름":""; cmp.style.color=(shop&&ec&&shop!==ec)?"red":"black"; }
  }

  // ── 선택 범위 ──
  function clearSel() {
    tbody.querySelectorAll(".sel").forEach(td=>td.classList.remove("sel"));
    dragStart=dragEnd=null;
  }

  function applySel(a, b) {
    tbody.querySelectorAll(".sel").forEach(td=>td.classList.remove("sel"));
    if(!a||!b) return;
    const r1=Math.min(a.parentElement.rowIndex,b.parentElement.rowIndex);
    const r2=Math.max(a.parentElement.rowIndex,b.parentElement.rowIndex);
    const c1=Math.min(a.cellIndex,b.cellIndex);
    const c2=Math.max(a.cellIndex,b.cellIndex);
    for(const tr of tbody.rows){
      if(tr.rowIndex<r1||tr.rowIndex>r2) continue;
      for(const td of tr.cells)
        if(td.cellIndex>=c1&&td.cellIndex<=c2) td.classList.add("sel");
    }
  }

  // ── 셀 편집 활성화 ──
  function activateCell(td, doSelectAll) {
    if(activeCell&&activeCell!==td){
      activeCell.contentEditable="false";
      activeCell.classList.remove("active");
      saveBefore(activeCell);
    }
    activeCell=td;
    td.contentEditable="true";
    td.classList.add("active");
    if(lastRow) lastRow.classList.remove("selected-row");
    lastRow=td.parentElement;
    lastRow.classList.add("selected-row");
    td.focus();
    if(doSelectAll) document.execCommand('selectAll',false,null);
  }

  function deactivateCell() {
    if(!activeCell) return;
    activeCell.contentEditable="false";
    activeCell.classList.remove("active");
    saveBefore(activeCell);
    activeCell=null;
  }

  function saveBefore(td) {
    const before=td.dataset.before??"", after=td.textContent;
    if(before!==after){ undoStack.push({cell:td,before,after}); if(undoStack.length>200) undoStack.shift(); }
  }

  // ── 마우스 이벤트 ──
  tbody.addEventListener("mousedown", function(e) {
    const td=e.target.closest("td");
    if(!td) return;
    isMouseDown=true;

    // 편집 중인 셀 클릭 → 편집 계속
    if(td===activeCell) return;

    // 다른 셀 클릭 → 편집 종료 + 드래그 시작
    deactivateCell();
    clearSel();
    dragStart=dragEnd=td;
    applySel(td,td);
  });

  document.addEventListener("mousemove", function(e) {
    if(!isMouseDown||!dragStart) return;
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const td=el?.closest?.("td");
    if(!td||!tbody.contains(td)) return;
    if(td===dragEnd) return;
    dragEnd=td;
    applySel(dragStart,dragEnd);
  });

  document.addEventListener("mouseup", function() {
    if(!isMouseDown) return;
    isMouseDown=false;
    if(!dragStart) return;

    const selected=[...tbody.querySelectorAll(".sel")];
    if(selected.length===1){
      // 단일 셀 → 편집 모드
      clearSel();
      activateCell(selected[0], false);
      selected[0].dataset.before=selected[0].textContent;
    }
    // 2개 이상 → 선택 유지
    // ★ 키보드 이벤트(Ctrl+C 등)를 받으려면 포커스가 필요
    if(selected.length>1){
      tbody.setAttribute("tabindex","0");
      tbody.focus();
    }
  });

  document.addEventListener("mousedown", function(e) {
    // ★ 테이블 바깥 클릭 시에만 선택 해제
    //   테이블 안 클릭은 tbody mousedown에서 처리
    if(!e.target.closest("#mainTable")){ clearSel(); deactivateCell(); }
  });

  // ── 키보드 ──
  document.addEventListener("keydown", function(e) {
    // Tab / Enter / 방향키는 activeCell 있을 때만
    if(activeCell && (e.key==="Tab"||e.key==="Enter"||e.key==="ArrowUp"||e.key==="ArrowDown")){
      const td=activeCell;
      if(e.key==="Tab"){
        e.preventDefault(); e.stopPropagation(); saveBefore(td);
        deactivateCell();
        const next=e.shiftKey?td.previousElementSibling:td.nextElementSibling;
        if(next){ next.dataset.before=next.textContent; activateCell(next,true); }
        return;
      }
      if(e.key==="Enter"){
        e.preventDefault(); saveBefore(td); deactivateCell();
        const nr=td.parentElement.nextElementSibling;
        if(nr){ nr.cells[td.cellIndex].dataset.before=nr.cells[td.cellIndex].textContent; activateCell(nr.cells[td.cellIndex],true); }
        return;
      }
      if(e.key==="ArrowUp"||e.key==="ArrowDown"){
        e.preventDefault(); saveBefore(td); deactivateCell();
        const sib=e.key==="ArrowUp"?td.parentElement.previousElementSibling:td.parentElement.nextElementSibling;
        if(sib){ sib.cells[td.cellIndex].dataset.before=sib.cells[td.cellIndex].textContent; activateCell(sib.cells[td.cellIndex],true); }
        return;
      }
    }

    // Delete/Backspace: 선택 셀 삭제
    if(e.key==="Delete"||e.key==="Backspace"){
      const selected=[...tbody.querySelectorAll(".sel")];
      if(!selected.length||activeCell) return;
      e.preventDefault();
      selected.forEach(cell=>{
        const before=cell.textContent.trim();
        if(before){ undoStack.push({cell,before,after:""}); cell.textContent=""; cell.dataset.before=""; }
      });
      saveDataToLocal();
      return;
    }

    // Ctrl+C
    if((e.ctrlKey||e.metaKey)&&e.key==="c"){
      const selected=[...tbody.querySelectorAll(".sel")];
      if(!selected.length) return;
      // ★ 포커스가 없어도 동작하도록 selected 체크만으로 진행
      e.preventDefault();
      const rows={};
      selected.forEach(td=>{ const r=td.parentElement.rowIndex; if(!rows[r]) rows[r]={}; rows[r][td.cellIndex]=td.textContent.trim(); });
      const rK=Object.keys(rows).sort((a,b)=>a-b);
      const cK=[...new Set(rK.flatMap(r=>Object.keys(rows[r])))].sort((a,b)=>a-b);
      const tsv=rK.map(r=>cK.map(c=>rows[r][c]??"").join("\t")).join("\n");
      navigator.clipboard.writeText(tsv).catch(()=>{
        const ta=document.createElement("textarea");
        ta.value=tsv; ta.style.cssText="position:fixed;opacity:0;";
        document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      });
      selected.forEach(td=>{ td.style.transition="background 0.15s"; td.style.background="#b3e5fc"; setTimeout(()=>{ td.style.background=""; setTimeout(()=>{ td.style.transition=""; },200); },300); });
      return;
    }

    // Ctrl+Z
    if((e.ctrlKey||e.metaKey)&&e.key==="z"){
      if(!undoStack.length) return;
      e.preventDefault();
      const {cell,before}=undoStack.pop();
      cell.textContent=before; cell.dataset.before=before;
      updateRow(cell.closest("tr")); saveDataToLocal();
      return;
    }
  });

  // ── 붙여넣기 ──
  document.addEventListener("paste", function(e) {
    const startCell = activeCell || dragStart;
    if(!startCell || !tbody.contains(startCell)) return;
    e.preventDefault();
    if(activeCell) deactivateCell();
    const text=(e.clipboardData||window.clipboardData).getData("text");
    const lines=text.split(/\r?\n/).filter(Boolean);
    const sr=startCell.parentElement.rowIndex-1, sc=startCell.cellIndex;
    lines.forEach((line,i)=>{
      const cols=line.split("\t");
      let row=tbody.rows[sr+i];
      if(!row){ addRows(1); row=tbody.rows[sr+i]; }
      if(!row) return;
      cols.forEach((val,j)=>{ const cell=row.cells[sc+j]; if(cell){ cell.textContent=val.trim(); updateRow(row); } });
    });
    saveDataToLocal();
  });

  // ── input ──
  tbody.addEventListener("input", function(e) {
    if(e.target.tagName!=="TD") return;
    updateRow(e.target.closest("tr"));
    scheduleSave();
  });

  function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveDataToLocal,500); }

  function saveDataToLocal(){
    const data=[];
    for(const tr of tbody.rows){
      const row=[...tr.cells].map(td=>td.textContent.trim());
      if(row.some(v=>v)) data.push(row);
    }
    try{ localStorage.setItem("productListData",JSON.stringify(data)); }catch(err){}
  }

  function addRows(n){
    const f=document.createDocumentFragment();
    for(let i=0;i<n;i++) f.appendChild(makeRow(null));
    tbody.appendChild(f);
  }
  document.querySelector(".table-wrapper").addEventListener("scroll",function(){
    if(this.scrollTop+this.clientHeight>=this.scrollHeight-50) addRows(BATCH);
  });
});

function downloadCSV(){
  const c=localStorage.getItem("productListData");
  if(c) localStorage.setItem("productListData_backup",c);
  alert("백업 저장 완료 👍");
}
function restoreProductBackup(){
  const backup=localStorage.getItem("productListData_backup");
  if(!backup){ alert("백업 데이터가 없습니다."); return; }
  if(!confirm("백업 데이터로 복구하시겠습니까?")) return;
  localStorage.setItem("productListData",backup);
  const tbody=document.getElementById("orderTable");
  let data; try{ data=JSON.parse(backup); }catch{ alert("백업 데이터 오류"); return; }
  while(tbody.firstChild) tbody.removeChild(tbody.firstChild);
  const COLS=15,frag=document.createDocumentFragment(),total=Math.max(20,data.length+10);
  for(let i=0;i<total;i++){
    const tr=document.createElement("tr");
    for(let j=0;j<COLS;j++){
      const td=document.createElement("td");
      td.contentEditable="false"; td.spellcheck=false; td.tabIndex=-1;
      if(data[i]?.[j]) td.textContent=data[i][j];
      tr.appendChild(td);
    }
    frag.appendChild(tr);
  }
  tbody.appendChild(frag);
  requestAnimationFrame(()=>{
    for(let i=0;i<data.length;i++){
      const row=tbody.rows[i]; if(!row) return;
      const w=parseFloat(row.cells[6]?.textContent)||0,l=parseFloat(row.cells[7]?.textContent)||0,h=parseFloat(row.cells[8]?.textContent)||0;
      if(w&&l&&h) row.cells[9].textContent=((w/1000)*(l/1000)*(h/1000)).toFixed(6);
    }
  });
  alert("복구 완료 👍");
}
function goPage(page){
  const m={"제품리스트":"제품리스트.html","특수품목리스트":"특수품목리스트.html","3PL리스트":"3PL리스트.html","중상리스트":"중상리스트.html"};
  location.href=m[page];
}
</script>

<div class="bottom-nav">
  <div class="nav-container">
    <button onclick="goPage('제품리스트')">제품리스트</button>
    <button onclick="goPage('특수품목리스트')">특수품목리스트</button>
    <button onclick="goPage('3PL리스트')">3PL리스트</button>
    <button onclick="goPage('중상리스트')">중상리스트</button>
  </div>
</div>
</body>
</html>
