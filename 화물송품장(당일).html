<!DOCTYPE html>
<html>
<head>
  <title>화물송품장(당일)</title>
  <meta charset="utf-8" />
  <style>
    body { font-family: Arial; display:flex; flex-direction:column; align-items:center; }
    h1 { text-align:center; margin-bottom:5px; }
    h2 { font-size:28px; font-weight:700; text-align:center; margin:5px 0; }
    .print-area-header { width:794px; margin:10px auto 0 auto; display:flex; justify-content:space-between; align-items:center; }
    .print-btn { background-color:#4CAF50; color:white; border:none; padding:6px 16px; font-size:15px; cursor:pointer; border-radius:4px; }
    .print-btn:hover { background-color:#45a049; }
    #clock { font-size:18px; padding-right:10px; }
    .a4 { width:794px; margin:0 auto; }
    .half { padding:6px 10px; }
    .cut-line { border-top:2px dashed black; margin:5mm 0; }
    .page-break { border-top:3px solid #aaa; margin:8mm 0; }
    table { width:100%; border-collapse:collapse; }
    th, td { border:1px solid #000; padding:4px; font-size:12px; text-align:center; height:28px; color:#070707; }
    td:focus { outline:2px solid #4CAF50; background-color:#f0fff4; }
    thead th { background-color:#ffe0b2; font-size:15px; font-weight:400; letter-spacing:1px; height:36px; padding:5px 7px; }
    @media print {
      thead th { background-color:#ffe0b2 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    }
    td:nth-child(1) { font-size:12px; }
    td:nth-child(2) { font-weight:500; font-size:13px; }
    td:nth-child(3), td:nth-child(4), td:nth-child(5),
    td:nth-child(6), td:nth-child(7), td:nth-child(8), td:nth-child(9) { font-size:13px; }
    th:nth-child(1){width:10%} th:nth-child(2){width:11%} th:nth-child(3){width:11%} th:nth-child(4){width:8%}
    th:nth-child(5){width:5%} th:nth-child(6){width:5%} th:nth-child(7){width:7%} th:nth-child(8){width:5%} th:nth-child(9){width:5%}
    tr:hover { background-color:#f5f5f5; }
    tr.selected-row { background-color:#cce5ff !important; }
    .cell-selected { background-color:#cce5ff !important; }
    tr:nth-child(even) td { background-color:#f0f0f0; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .table-footer { width:100%; display:flex; justify-content:center; gap:28mm; margin-top:2mm; font-size:15px; }
    .date-line { width:100%; text-align:right; font-size:16px; margin-bottom:2px; }
    @media print {
      @page { size:A4; margin-top:4mm; margin-right:5mm; margin-bottom:3mm; margin-left:5mm; }
      .print-btn { display:none; }
      .print-area-header div:first-child { display:none; }
      body { zoom:0.95; }
      .print-area-header { justify-content:flex-end; }
      #clock { float:right; text-align:right; margin-right:0; }
      .page-break { display:none; }
      .a4 { page-break-before:always; break-before:always; }
      .a4:first-of-type { page-break-before:auto; break-before:auto; }
    }
  </style>
</head>
<body>

<h1 style="display:none;">화물송품장(당일)</h1>

<div class="print-area-header">
  <div>
    <button class="print-btn" onclick="window.print()">인쇄</button>
    <button onclick="reloadFromAccum()" style="background:#2196F3;color:white;border:none;padding:6px 16px;font-size:15px;cursor:pointer;border-radius:4px;margin-left:8px;">새로고침</button>
  </div>
  <div id="clock"></div>
</div>

<div id="pagesContainer"></div>

<script>
  function clock() {
    var t=new Date(), week=["일","월","화","수","목","금","토"];
    var text=(t.getMonth()+1)+"월 "+t.getDate()+"일 "+week[t.getDay()]+"요일";
    document.querySelectorAll(".bottom-clock").forEach(el=>el.innerText=text);
  }
  clock(); setInterval(clock,1000);

  const ROWS_PER_PAGE=10;
  const FOOTER_TEXT=["발화주 : 메이크박스(1644-0139)","대신정기화물 경기덕소영업소(031-576-3222 / F.031-576-3250)"];
  const ACCUM_KEY="cargoAccumData"; // ★ 누적 저장 키

  function createPageHTML(pageIdx) {
    const topId="topTable_"+pageIdx, bottomId="bottomTable_"+pageIdx;
    const topSumId="grandTotalTop_"+pageIdx, botSumId="grandTotalbottom_"+pageIdx;
    const topCashId="grandTotalcashTop_"+pageIdx, botCashId="grandTotalcashbottom_"+pageIdx;
    const thead=`<thead><tr>
      <th>도착지</th><th>수화주</th><th>전화번호</th><th>품명</th><th>포장</th>
      <th>수량<div id="${topSumId}" style="font-size:10px;color:red;font-weight:400;margin-top:2px;">0</div></th>
      <th>운임</th>
      <th>현<div id="${topCashId}" style="font-size:10px;color:red;font-weight:400;margin-top:2px;">0</div></th>
      <th>착</th>
    </tr></thead>`;
    const thead2=`<thead><tr>
      <th>도착지</th><th>수화주</th><th>전화번호</th><th>품명</th><th>포장</th>
      <th>수량<div id="${botSumId}" style="font-size:10px;color:red;font-weight:400;margin-top:2px;">0</div></th>
      <th>운임</th>
      <th>현<div id="${botCashId}" style="font-size:10px;color:red;font-weight:400;margin-top:2px;">0</div></th>
      <th>착</th>
    </tr></thead>`;
    let topRows="", botRows="";
    for(let i=0;i<ROWS_PER_PAGE;i++){
      topRows+="<tr>"+Array(9).fill("<td contenteditable='true'></td>").join("")+"</tr>";
      botRows+="<tr>"+Array(9).fill("<td></td>").join("")+"</tr>";
    }
    const pageBreak=pageIdx>0?`<div class="page-break" style="margin-top:1cm;"></div>`:"";
    const marginTop=pageIdx>0?`margin-top:0.7cm;`:"";
    return `
      ${pageBreak}
      <div class="a4" data-page="${pageIdx}" style="${marginTop}">
        <h1 style="text-align:center; margin:3px 0;">화물송품장 (당일누적)</h1>
        <div class="date-line bottom-clock"></div>
        <div class="half top">
          <table id="${topId}">${thead}<tbody>${topRows}</tbody></table>
        </div>
        <div class="table-footer"><span>${FOOTER_TEXT[0]}</span><span>${FOOTER_TEXT[1]}</span></div>
        <div class="cut-line"></div>
        <div class="half bottom">
          <h2>화물송품장(보관용)</h2>
          <div class="date-line bottom-clock"></div>
          <table id="${bottomId}">${thead2}<tbody>${botRows}</tbody></table>
        </div>
        <div class="table-footer"><span>${FOOTER_TEXT[0]}</span><span>${FOOTER_TEXT[1]}</span></div>
      </div>`;
  }

  let pageCount=0;
  function addPage() {
    const container=document.getElementById("pagesContainer");
    container.insertAdjacentHTML("beforeend",createPageHTML(pageCount));
    const idx=pageCount; pageCount++;
    const topTable=document.getElementById("topTable_"+idx);
    const botTable=document.getElementById("bottomTable_"+idx);
    topTable.addEventListener("input",function(){ syncBottom(idx); updateSums(idx); });
    topTable.querySelector("tbody").addEventListener("keydown",function(e){
      const cell=e.target; if(cell.tagName!=="TD") return;
      const row=cell.parentElement, col=cell.cellIndex; let target=null;
      switch(e.key){
        case "ArrowRight": target=row.cells[col+1]; break;
        case "ArrowLeft":  target=row.cells[col-1]; break;
        case "ArrowDown":  target=row.nextElementSibling?.cells[col]; break;
        case "ArrowUp":    target=row.previousElementSibling?.cells[col]; break;
        case "Enter": e.preventDefault(); target=row.nextElementSibling?.cells[col]; break;
        case "Tab":   e.preventDefault(); target=row.cells[col+1]||row.nextElementSibling?.cells[0]; break;
      }
      if(target){target.focus();selectCellText(target);}
    });
    [topTable,botTable].forEach(t=>{
      let lastRow=null;
      t.addEventListener("focusin",function(e){
        if(e.target.tagName!=="TD") return;
        if(lastRow) lastRow.classList.remove("selected-row");
        e.target.parentElement.classList.add("selected-row");
        lastRow=e.target.parentElement; selectCellText(e.target);
      });
    });
    topTable.addEventListener("blur",function(e){
      if(e.target.tagName!=="TD"||e.target.cellIndex!==6) return;
      const v=e.target.innerText.replace(/,/g,"").trim();
      if(!isNaN(v)&&v!==""){e.target.innerText=Number(v).toLocaleString("ko-KR");}
    },true);
    [topTable,botTable].forEach(t=>t.addEventListener("dragstart",e=>e.preventDefault()));
    topTable.addEventListener("focusin",function(e){ if(e.target.tagName!=="TD") return; e.target.dataset.before=e.target.innerText; });
    topTable.addEventListener("input",function(e){
      if(e.target.tagName!=="TD") return;
      const before=e.target.dataset.before??"", after=e.target.innerText;
      if(before!==after){ undoStack.push({cell:e.target,pageIdx:idx,before,after}); e.target.dataset.before=after; }
    });
    enableDragSelect(topTable); enableDragSelect(botTable);
    clock(); return idx;
  }

  function syncBottom(idx){
    const topRows=document.getElementById("topTable_"+idx).querySelectorAll("tbody tr");
    const botRows=document.getElementById("bottomTable_"+idx).querySelectorAll("tbody tr");
    topRows.forEach((row,i)=>{ Array.from(row.cells).forEach((cell,j)=>{ botRows[i].cells[j].innerText=cell.innerText; }); });
  }
  function updateSums(idx){
    const topRows=document.getElementById("topTable_"+idx).querySelectorAll("tbody tr");
    let qty=0, cash=0;
    topRows.forEach(row=>{
      qty+=parseFloat(row.cells[5]?.innerText.replace(/,/g,""))||0;
      if(row.cells[7]?.innerText.trim()==="○") cash+=parseFloat(row.cells[6]?.innerText.replace(/,/g,""))||0;
    });
    document.getElementById("grandTotalTop_"+idx).innerText=qty;
    document.getElementById("grandTotalbottom_"+idx).innerText=qty;
    document.getElementById("grandTotalcashTop_"+idx).innerText=cash.toLocaleString("ko-KR");
    document.getElementById("grandTotalcashbottom_"+idx).innerText=cash.toLocaleString("ko-KR");
  }
  function selectCellText(cell){
    if(!cell) return;
    setTimeout(()=>{ const range=document.createRange(); range.selectNodeContents(cell); const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range); },0);
  }
  let isMouseDown=false, dragStartCell=null, selectedCells=[];
  function enableDragSelect(table){
    table.addEventListener("mousedown",e=>{ if(e.target.tagName!=="TD") return; isMouseDown=true; dragStartCell=e.target; clearSelection(); });
    table.addEventListener("mouseover",e=>{ if(!isMouseDown||e.target.tagName!=="TD") return; selectCellRange(dragStartCell,e.target); });
  }
  document.addEventListener("mouseup",()=>{ isMouseDown=false; });
  function selectCellRange(c1,c2){
    clearSelection();
    const table=c1.closest("table");
    const r1=c1.parentElement.rowIndex, r2=c2.parentElement.rowIndex;
    const c1i=c1.cellIndex, c2i=c2.cellIndex;
    Array.from(table.rows).slice(Math.min(r1,r2),Math.max(r1,r2)+1).forEach(row=>{
      for(let c=Math.min(c1i,c2i);c<=Math.max(c1i,c2i);c++){ row.cells[c]?.classList.add("cell-selected"); selectedCells.push(row.cells[c]); }
    });
  }
  function clearSelection(){ selectedCells.forEach(c=>c?.classList.remove("cell-selected")); selectedCells=[]; }

  const undoStack=[];
  document.addEventListener("keydown",function(e){
    if(!(e.ctrlKey||e.metaKey)||e.key!=="z") return;
    if(!undoStack.length) return;
    e.preventDefault();
    const {cell,pageIdx,before}=undoStack.pop();
    cell.innerText=before; cell.dataset.before=before;
    const ri=cell.parentElement.rowIndex-1, ci=cell.cellIndex;
    const botRow=document.getElementById("bottomTable_"+pageIdx)?.rows[ri+1];
    if(botRow?.cells[ci]) botRow.cells[ci].innerText=before;
  });

  // ── 누적 데이터 로드 ──
  function reloadFromAccum() {
    // 날짜 체크 — 다른 날이면 자동 초기화
    const today = new Date().toLocaleDateString('ko-KR');
    const savedDate = localStorage.getItem("cargoAccumDate");
    if(savedDate && savedDate !== today){
      localStorage.removeItem("cargoAccumData");
      localStorage.removeItem("cargoAccumDate");
    }
    const saved=localStorage.getItem(ACCUM_KEY);
    const data=saved?JSON.parse(saved):[];
    const pagesNeeded=Math.max(1,Math.ceil(data.length/ROWS_PER_PAGE));
    document.getElementById("pagesContainer").innerHTML="";
    pageCount=0;
    for(let p=0;p<pagesNeeded;p++) addPage();
    data.forEach((item,i)=>{
      const pageIdx=Math.floor(i/ROWS_PER_PAGE), rowIdx=i%ROWS_PER_PAGE;
      const topTable=document.getElementById("topTable_"+pageIdx);
      const botTable=document.getElementById("bottomTable_"+pageIdx);
      if(!topTable) return;
      const topRow=topTable.querySelectorAll("tbody tr")[rowIdx];
      const botRow=botTable.querySelectorAll("tbody tr")[rowIdx];
      if(!topRow) return;
      topRow.cells[0].innerText=(item.depot==="지점을 입력하세요"?"":item.depot)||"";
      topRow.cells[1].innerText=item.name||"";
      topRow.cells[2].innerText=item.mobile||"";
      topRow.cells[3].innerText="종이상자";
      topRow.cells[4].innerText="상자";
      topRow.cells[5].innerText=item.count||"";
      const _p=parseFloat((item.price||"0").replace(/,/g,""))||0;
      const _c=parseFloat((item.count||"0").replace(/,/g,""))||0;
      const _t=_p*_c;
      topRow.cells[6].innerText=_t>0?_t.toLocaleString():(item.price||"");
      topRow.cells[7].innerText=item.pay==="선불"?"○":"";
      topRow.cells[8].innerText=item.pay==="착불"?"○":"";
      if(botRow) Array.from(topRow.cells).forEach((cell,j)=>{ botRow.cells[j].innerText=cell.innerText; });
      updateSums(pageIdx);
    });
    if(pageCount===0) addPage();
    clock();
  }

  document.addEventListener("DOMContentLoaded",function(){ addPage(); reloadFromAccum(); });
  window.addEventListener("load",reloadFromAccum);
  window.addEventListener("pageshow",reloadFromAccum);
  window.addEventListener("focus",reloadFromAccum);
</script>
<script src="버튼.js"></script>
</body>
</html>
